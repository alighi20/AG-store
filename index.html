<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فروشگاه</title>

    <link rel="stylesheet" href="./css/bootstrap.css" />
    <link rel="stylesheet" href="./css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <script defer type="module" src="script/main.js"></script>

</head>
<body>

    <header class="main-header">
        <div class="container header-row">
            <a href="." class="logo">
               <img src="img/91bf0b86-863d-42b2-8ec4-ad10cfdbd6a6.png" style="width: 50px;" alt="logo" class="logo__img">
            </a>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="جستجو در محصولات..." />
            </div>

            <div class="header-actions">
                <button id="cartToggleBtn" class="cart-btn">
                    <i class="fa fa-shopping-cart"></i>
                    <span>سبد</span>
                    <span id="cartCount" class="cart-count">0</span>
                </button>

<div id="authArea" class="auth-area">
    <div id="guestBox" class="guest-box">
        <button id="openLoginBtn" class="auth-toggle-btn"><a href="login.html"></a>ورود</button>
        <button id="openRegisterBtn" class="auth-toggle-btn secondary"><a href="register.html"></a>ثبت‌نام</button>
    </div>
</div>


    <div id="userBox" class="user-box hidden">
        <span class="welcome-text">وارد شده‌اید</span>
        <button id="logoutBtn" class="logout-btn">خروج</button>
    </div>
</div>

                </div>
            </div>
        </div>
    </header>

    <nav class="sub-nav">
        <div class="container">
            <ul class="menu-list">
                <li class="menu-item categories nav-item">
                    <strong>گروه محصولات</strong>
                     <ul class="submenu" id="submenu-category"> 

    </ul>
</li>
                <li class="menu-item"><a href="#/">محصولات</a></li>
                <li class="menu-item"><a href="#/cart">سبد خرید</a></li>
            </ul>
        </div>
    </nav>

    <main class="container main-content">
        <aside class="sidebar">
            <h3>فیلترها</h3>

            <div class="filter-group">
                <label for="sortSelect">مرتب‌سازی</label>
                <select id="sortSelect">
                    <option value="default">پیش‌فرض</option>
                    <option value="price-asc">ارزان‌ترین</option>
                    <option value="price-desc">گران‌ترین</option>
                    <option value="title">الفبایی</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="minPrice">حداقل قیمت</label>
                <input type="number" id="minPrice" placeholder="مثلاً 1000000" />
            </div>

            <div class="filter-group">
                <label for="maxPrice">حداکثر قیمت</label>
                <input type="number" id="maxPrice" placeholder="مثلاً 50000000" />
            </div>

            <div class="filter-group">
                <button id="applyFiltersBtn" class="filter-btn">اعمال فیلتر</button>
            </div>
        </aside>

        <section class="products-section">
            <div class="sorting top-bar">
                <div id="pageTitle">لیست محصولات</div>
            </div>

            <div id="app"></div>

            <div id="pagination" class="pagination"></div>
        </section>
    </main>

    <div id="cartDrawer" class="cart-drawer hidden"></div>
    <div id="toastBox" class="toast-box"></div>
</body>
</html>
